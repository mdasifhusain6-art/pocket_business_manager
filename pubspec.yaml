name: pocket_business_manager
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  curved_navigation_bar: ^1.0.6
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  google_fonts: ^8.0.2
  intl: ^0.20.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  flutter_localizations:
    sdk: flutter
  fl_chart: ^1.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^7.2.0
  image_picker: ^1.2.1
  local_auth: ^3.0.1
  url_launcher: ^6.3.2
  cryptography_flutter: ^2.3.4
  crypto: ^3.0.7
  flutter_animate: ^4.5.2
  flutter_spinkit: ^5.2.2
  excel: ^4.0.0
  share_plus: ^10.1.0

dev_dependencies:
  build_runner: any
  isar_generator: ^3.1.0+1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: "launcher_main"
  ios: true
  image_path: "assets/logo/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0A0F1E"
  image: "assets/logo/splash.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo/
